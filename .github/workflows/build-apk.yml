name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'scripts/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply UI polish patches
        run: |
          python3 scripts/patch_notes_screens.py
          git diff --stat || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ORG_GRADLE_PROJECT_org.gradle.jvmargs: -Xmx3g -XX:MaxMetaspaceSize=512m
          ORG_GRADLE_PROJECT_TOP_FLOW_VERSION_CODE: '118'
          ORG_GRADLE_PROJECT_TOP_FLOW_VERSION_NAME: '30.5'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: the-top-flow-debug
          path: |
            app/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/debug/*.apk
          if-no-files-found: error
