stages:
  - build

build_debug:
  image: eclipse-temurin:17-jdk
  stage: build
  script:
    - apt-get update && apt-get install -y unzip curl
    - curl -L "$(curl -s https://developer.android.com/studio | grep -o 'https://dl.google.com/android/repository/commandlinetools-linux-[0-9]*_latest.zip' | head -n 1)" -o cmdline-tools.zip
    - mkdir -p android-sdk/cmdline-tools/latest
    - unzip -q cmdline-tools.zip -d cmdline-tools-temp
    - cp -R cmdline-tools-temp/cmdline-tools/* android-sdk/cmdline-tools/latest/
    - export ANDROID_HOME="$PWD/android-sdk"
    - export ANDROID_SDK_ROOT="$PWD/android-sdk"
    - yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null
    - android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
    - ./gradlew assembleDebug
  artifacts:
    paths:
      - app/build/outputs/apk/debug/app-debug.apk
